        function startLesson(lessonId) {

        function showVocabulary(lessonId) {
            const data = lessonVocab[lessonId];
            document.getElementById('menuView').classList.add('hidden');
            document.getElementById('teacherView').classList.add('hidden');
            document.getElementById('quizView').classList.add('hidden');
            document.getElementById('vocabView').classList.remove('hidden');

            document.getElementById('vocabRootBadge').textContent = `Root: ${data.root}`;
            document.getElementById('vocabMeaning').textContent = `Meaning: ${data.meaning}`;

            const list = document.getElementById('vocabList');
            list.innerHTML = '';
            
            data.words.forEach(item =&gt; {
                const card = document.createElement('div');
                card.className = 'vocab-card bg-white p-4 rounded-xl border border-slate-200 shadow-sm';
                card.innerHTML = `

                `;
                list.appendChild(card);
            });
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            const lessonId = currentLessonId;

            const originalQuestions = lessons[lessonId].questions;
            shuffledQuestions = [...originalQuestions].sort(() =&gt; Math.random() - 0.5);

            if (!userAnswers[lessonId]) {
                userAnswers[lessonId] = {};
            }

            document.getElementById('menuView').classList.add('hidden');
            document.getElementById('teacherView').classList.add('hidden');
            document.getElementById('vocabView').classList.add('hidden');
            document.getElementById('quizView').classList.remove('hidden');

            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex &gt;= shuffledQuestions.length) {
                finishLesson();
                return;
            }

            const q = shuffledQuestions[currentQuestionIndex];

            document.getElementById('currentQNum').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQNum').textContent = shuffledQuestions.length;
            document.getElementById('quizProgressBar').style.width = `${((currentQuestionIndex) / shuffledQuestions.length) * 100}%`;

            document.getElementById('qTag').textContent = q.type.replace('-', ' ');
            document.getElementById('questionText').textContent = q.q;

            document.getElementById('feedbackOverlay').classList.add('hidden');
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            if (q.type === 'text-input') {
                const inputContainer = document.createElement('div');
                inputContainer.className = 'w-full';
                inputContainer.innerHTML = `
                    &lt;input type=&quot;text&quot; id=&quot;answerInput&quot; 
                        class=&quot;w-full p-4 text-lg rounded-xl border-2 border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all&quot;
                        placeholder=&quot;Type your answer here...&quot; autocomplete=&quot;off&quot;&gt;
                    &lt;button id=&quot;submitAnswerBtn&quot; 
                        class=&quot;mt-4 w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-lg&quot;&gt;
                        Submit Answer
                    &lt;/button&gt;
                `;
                grid.appendChild(inputContainer);
                
                const input = inputContainer.querySelector('input');
                const btn = inputContainer.querySelector('button');
                
                const submitHandler = () =&gt; {
                    if (input.value.trim()) {
                        checkAnswer(q, input.value.trim(), input);
                    }
                };

                btn.onclick = submitHandler;
                input.addEventListener('keypress', (e) =&gt; {
                    if (e.key === 'Enter') submitHandler();
                });
                
                // Auto focus
                setTimeout(() =&gt; input.focus(), 100);

            } else {
                const opts = [...q.opts].sort(() =&gt; Math.random() - 0.5);
                opts.forEach(opt =&gt; {
                    const btn = document.createElement('button');
                    btn.className = 'option-card w-full text-left p-4 rounded-xl border border-slate-200 text-slate-700 font-medium text-lg flex items-center justify-between group';
                    btn.innerHTML = `
                        &lt;span&gt;${opt}&lt;/span&gt;
                        &lt;div class=&quot;w-6 h-6 rounded-full border-2 border-slate-300 group-hover:border-blue-400 flex items-center justify-center&quot;&gt;
                            &lt;div class=&quot;w-3 h-3 rounded-full bg-blue-500 opacity-0 transition-opacity&quot;&gt;&lt;/div&gt;
                        &lt;/div&gt;
                    `;
                    btn.onclick = () =&gt; checkAnswer(q, opt, btn);
                    grid.appendChild(btn);
                });
            }
        }

        function checkAnswer(question, selectedOpt, element) {
            let isCorrect = false;
            
            if (question.type === 'text-input') {
                // Case insensitive check for text input
                isCorrect = selectedOpt.toLowerCase() === question.a.toLowerCase();
                const input = document.getElementById('answerInput');
                const btn = document.getElementById('submitAnswerBtn');
                input.disabled = true;
                btn.disabled = true;
                
                if (isCorrect) {
                    input.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#10b981', '#3b82f6', '#f59e0b']
                    });
                } else {
                    input.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                }
            } else {
                const buttons = document.querySelectorAll('.option-card');
                buttons.forEach(b =&gt; b.disabled = true);
                isCorrect = selectedOpt === question.a;

                if (isCorrect) {
                    element.classList.add('correct');
                    element.querySelector('.w-3').classList.remove('opacity-0');
                    element.querySelector('.w-3').classList.add('bg-green-500');
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#10b981', '#3b82f6', '#f59e0b']
                    });
                } else {
                    element.classList.add('wrong');
                    buttons.forEach(b =&gt; {
                        if (b.innerText.includes(question.a)) {
                            b.classList.add('correct');
                        }
                    });
                }
            }

            userAnswers[currentLessonId][question.id] = {
                correct: isCorrect,
                answer: selectedOpt,
                timestamp: new Date().toISOString()
            };
            saveProgress();

            const overlay = document.getElementById('feedbackOverlay');
            const icon = document.getElementById('feedbackIcon');
            const title = document.getElementById('feedbackTitle');
            const text = document.getElementById('feedbackText');
            const nextBtn = document.getElementById('nextBtn');

            overlay.classList.remove('hidden');

            if (isCorrect) {
                icon.textContent = '🎉';
                icon.className = 'w-16 h-16 rounded-full flex items-center justify-center mb-4 text-3xl shadow-lg bg-green-100 text-green-600';
                title.textContent = 'Correct!';
                title.className = 'text-2xl font-bold mb-2 text-green-600';
            } else {
                icon.textContent = '❌';
                icon.className = 'w-16 h-16 rounded-full flex items-center justify-center mb-4 text-3xl shadow-lg bg-red-100 text-red-600';
                title.textContent = 'Incorrect';
                title.className = 'text-2xl font-bold mb-2 text-red-600';
                // Show correct answer for text input
                if (question.type === 'text-input') {
                    text.innerHTML = `&lt;div class=&quot;mb-2&quot;&gt;Correct answer: &lt;span class=&quot;font-bold&quot;&gt;${question.a}&lt;/span&gt;&lt;/div&gt;${question.exp}`;
                }
            }
            
            if (question.type !== 'text-input') {
                text.textContent = question.exp;
            } else if (isCorrect) {
                text.textContent = question.exp;
            }

            text.style.display = 'block';

            nextBtn.style.display = 'inline-block';
            if (currentQuestionIndex &gt;= shuffledQuestions.length - 1) {
                nextBtn.textContent = 'Finish Lesson';
                nextBtn.onclick = finishLesson;
            } else {
                nextBtn.textContent = 'Next Question';
                nextBtn.onclick = () =&gt; {
                    currentQuestionIndex++;
                    renderQuestion();
                };
            }
        }

            const modal = document.getElementById('submitModal');
            const codeDisplay = document.getElementById('completionCode');

            const report = {
                lesson: lessons[currentLessonId].title,
                date: new Date().toLocaleDateString(),
                score: calculateScore(currentLessonId),
                details: userAnswers[currentLessonId]
            };

            const code = btoa(JSON.stringify(report));
            codeDisplay.textContent = code;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            updateMenuProgress();
        }

            document.getElementById('quizView').classList.add('hidden');

            document.getElementById('menuView').classList.remove('hidden');
            updateMenuProgress();
        }

        function saveProgress() {
            localStorage.setItem('wr_l11_12_progress', JSON.stringify(userAnswers));
        }

        function loadProgress() {
            const saved = localStorage.getItem('wr_l11_12_progress');
            if (saved) {
                userAnswers = JSON.parse(saved);
            }
        }

        function calculateScore(lessonId) {
            if (!userAnswers[lessonId]) return 0;
            const answers = userAnswers[lessonId];
            const total = lessons[lessonId].questions.length;
            let correct = 0;

            Object.values(answers).forEach(ans =&gt; {
                if (ans.correct) correct++;
            });

            return Math.round((correct / total) * 100);
        }

        function updateMenuProgress() {
            [11, 12, 113].forEach(id =&gt; {
                const score = calculateScore(id);
                const bar = document.getElementById(`progress-${id}`);
                const text = document.getElementById(`score-${id}`);

                if (bar &amp;&amp; text) {
                    bar.style.width = `${score}%`;
                    text.innerHTML = `&lt;span&gt;${score}%&lt;/span&gt;`;
                }
            });
        }

            const code = document.getElementById('completionCode').textContent;
            navigator.clipboard.writeText(code).then(() =&gt; {
                alert('Code copied to clipboard!');

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

      event.stopPropagation()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
